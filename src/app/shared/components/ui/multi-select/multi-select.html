<div class="relative w-full">
  <span class="block pb-1 text-sm text-text2">{{ labelControl() }}</span>

  <!-- Trigger -->
  <div
    class="flex items-center justify-between pl-4 pr-4 rounded-md border-2 bg-background pt-2 pb-2 cursor-pointer transition-all w-full"
    [ngClass]="triggerClasses"
    (click)="toggleDropdown()"
    tabindex="0"
    (keydown.enter)="toggleDropdown()"
    (keydown.space)="toggleDropdown()"
  >
    <span class="text-sm text-text2 truncate select-none whitespace-nowrap min-h-[20px]">
      {{ getSelectedLabel() }}
    </span>
    <!-- Chevron Icon (simple SVG) -->
    <svg
      class="w-4 h-4 transition-transform duration-200"
      [class.rotate-180]="isOpen()"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 20 20"
      fill="currentColor"
    >
      <path
        fill-rule="evenodd"
        d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
        clip-rule="evenodd"
      />
    </svg>
  </div>

  <!-- Dropdown Panel -->
  @if (isOpen()) {
    <div
      class="absolute left-0 right-0 z-50 mt-1 bg-background2 border-2 border-surface rounded-lg shadow-xl overflow-hidden animate-in fade-in zoom-in duration-200"
    >
      <div class="max-h-[250px] overflow-y-auto p-2 flex flex-col gap-1">
        @for (opt of options(); track opt.value) {
          <div
            class="flex items-center gap-3 p-2 rounded-md hover:bg-background3 cursor-pointer transition-colors"
            (click)="onOptionToggle(opt.value)"
            tabindex="0"
            role="button"
            (keydown.enter)="onOptionToggle(opt.value)"
            (keydown.space)="onOptionToggle(opt.value)"
          >
            <!-- Mock checkbox if not using app-checkbox directly for better alignment -->
            <div
              class="w-5 h-5 rounded border-2 border-primary flex items-center justify-center transition-colors"
              [ngClass]="{
                'bg-primary': isSelected(opt.value),
                'bg-transparent': !isSelected(opt.value),
              }"
            >
              @if (isSelected(opt.value)) {
                <svg
                  class="w-3.5 h-3.5 text-text2"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="3"
                    d="M5 13l4 4L19 7"
                  />
                </svg>
              }
            </div>
            <span class="text-sm text-text2 select-none">{{ opt.name }}</span>
          </div>
        }
      </div>

      <div class="p-2 border-t border-surface bg-background2">
        <app-btn [text]="btnText()" variant="flat" color="primary" size="sm" (click)="emitSend()" />
      </div>
    </div>
  }
</div>
