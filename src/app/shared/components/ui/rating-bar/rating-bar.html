<div class="flex flex-col gap-1 w-full">
  @if (label) {
    <label class="font-semibold text-white text-sm">{{ label }}</label>
  }

  <div class="flex items-end gap-1.5" [style.height.px]="barContainerHeight">
    @for (seg of segments; track seg; let i = $index) {
      <button
        type="button"
        (click)="select(i + 1)"
        [attr.aria-label]="'Nivel ' + (i + 1)"
        [style.height.%]="getBarHeight(i + 1)"
        [ngClass]="getBarClasses(i + 1)"
        class="flex-1 rounded-sm border-[1.5px] cursor-pointer transition-opacity duration-150 hover:opacity-80 focus:outline-none focus-visible:ring-2 focus-visible:ring-white/50"
      ></button>
    }
  </div>

  <input type="hidden" [name]="name" [value]="control.value" />

  @if (showHint && currentHint) {
    <span class="text-xs text-white/50 min-h-[1.1rem]">{{ currentHint }}</span>
  } @else {
    <span class="block text-xs min-h-[1.1rem]">&nbsp;</span>
  }
</div>
