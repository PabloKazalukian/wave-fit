<div class="grid grid-cols-2 gap-3">
  @for (routine of routines(); track routine.id) {
    <div class="bg-background2 border-2 border-background4 rounded-xl p-3 history-item">
      <p class="text-sm font-semibold text-text1 mb-1.5">{{ routine.title }}</p>
      @if (routine.type && routine.type.length) {
        <div class="flex flex-wrap gap-1">
          @for (cat of routine.type; track cat) {
            <span class="text-xs px-2 py-0.5 bg-primary/15 text-primary rounded-full">
              {{ categoryLabel(cat) }}
            </span>
          }
        </div>
      }
    </div>
  }
</div>
