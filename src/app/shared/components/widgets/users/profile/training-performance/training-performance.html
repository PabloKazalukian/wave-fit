<section class="container px-4 py-4 max-w-lg mx-auto mt-8">
  <section class="bg-background2 border-2 border-background4 rounded-2xl p-5">
    <h2>Preferencias de entrenamiento</h2>

    <form class="flex flex-wrap gap-5 mt-8" [formGroup]="trainingForm" (ngSubmit)="onSubmit()">
      <app-multi-select
        [label]="'Estilos preferidos'"
        [text]="'Selecciona estilos'"
        [options]="preferredStylesOptions"
        [control]="preferredStylesControl"
        [max]="3"
      >
      </app-multi-select>

      <app-select
        [label]="'Preferencia cardio'"
        [options]="cardioOptions"
        [control]="cardioPreferenceControl"
      >
      </app-select>

      <app-select
        [label]="'Intensidad'"
        [options]="intensityOptions"
        [control]="intensityPreferenceControl"
      >
      </app-select>

      <app-input [label]="'Ambiente entrenamiento'" [type]="'text'" [control]="workoutVibeControl">
      </app-input>

      <app-btn
        [text]="'Guardar preferencias'"
        [color]="'primary3'"
        [variant]="'raised'"
        [buttonType]="'submit'"
        [isDisabled]="trainingForm.pristine"
      >
      </app-btn>
    </form>
  </section>
</section>
