<section class="container px-4 py-4 max-w-lg mx-auto mt-8 pb-12">
  <section class="profile-card bg-background2 border-2 border-background4 rounded-2xl p-5 mb-6">
    <h2 class="text-2xl font-semibold text-primary">Configuración del perfil</h2>
    <form class="flex flex-wrap gap-5 mt-8" [formGroup]="profileForm" (ngSubmit)="onSubmit()">
      <app-input [label]="'Fecha de nacimiento'" [type]="'date'" [control]="birthDateControl">
      </app-input>

      <app-input-number [label]="'Altura cm'" [control]="heightCmControl"> </app-input-number>

      <app-input-number [label]="'Peso kg'" [control]="weightKgControl"> </app-input-number>

      <app-input-number [label]="'Grasa corporal %'" [control]="bodyFatPctControl">
      </app-input-number>

      <app-select [label]="'Sexo'" [options]="genderOptions" [control]="genderControl">
      </app-select>

      <app-select
        [label]="'Distribución'"
        [options]="distributionOptions"
        [control]="distributionDaysControl"
      >
      </app-select>

      <app-select [label]="'Unidades'" [options]="unitsOptions" [control]="unitsPreferenceControl">
      </app-select>

      <app-btn
        [text]="'Guardar perfil'"
        [color]="'primary3'"
        [variant]="'raised'"
        [buttonType]="'submit'"
        [isDisabled]="profileForm.invalid"
      >
      </app-btn>
    </form>
  </section>
</section>
