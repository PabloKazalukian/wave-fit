<section class="container px-4 py-4 max-w-lg mx-auto mt-8">
  <section class="bg-background2 border-2 border-background4 rounded-2xl p-5">
    <h2>Disponibilidad semanal</h2>

    <form class="flex flex-wrap gap-5 mt-8" [formGroup]="scheduleForm" (ngSubmit)="onSubmit()">
      <app-input-number [label]="'Días por semana'" [control]="daysPerWeekControl">
      </app-input-number>

      <app-multi-select
        [label]="'Días preferidos'"
        [text]="'Selecciona días'"
        [options]="preferredDaysOptions"
        [control]="preferredDaysControl"
      >
      </app-multi-select>

      <app-input-number [label]="'Duración sesión minutos'" [control]="sessionDurationMinControl">
      </app-input-number>

      <app-select [label]="'Horario preferido'" [options]="preferredTimeOptions" [control]="preferredTimeControl">
      </app-select>

      <app-select [label]="'Actividad descanso'" [options]="restDayActivityOptions" [control]="restDayActivityControl">
      </app-select>

      <app-btn
        [text]="'Guardar horario'"
        [color]="'primary3'"
        [variant]="'raised'"
        [buttonType]="'submit'"
        [isDisabled]="scheduleForm.invalid"
      >
      </app-btn>
    </form>
  </section>
</section>
