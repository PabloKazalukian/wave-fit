<section class="bg-background1 border border-background4 rounded-2xl p-4">
  <h3 class="text-primary font-bold mb-4">Historial de planes con coachAI:</h3>

  @if (planResults()) {
    <div class="flex flex-col gap-3 overflow-auto max-h-96">
      @for (plan of planResults()!; track plan.id) {
        <div
          class="flex items-center justify-between bg-background2 border border-background4 rounded-xl p-3"
        >
          <div class="flex flex-col">
            <span class="text-text1 font-semibold text-sm">{{ plan.title }}</span>
            <span class="text-text2 text-xs">{{ formatDate(plan.createdAt) }}</span>
          </div>
          <app-btn
            [text]="'Ver completo'"
            [color]="'accent'"
            [variant]="'outline'"
            [size]="'sm'"
            (click)="viewPlan.emit(plan.id)"
          />
        </div>
      }
    </div>
  } @else {
    <p class="text-text2 text-xs">No hay planes</p>
  }
</section>
