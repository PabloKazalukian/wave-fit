<div
  class="border-2 bg-background1 border-background3 py-4 my-8 rounded-2xl flex flex-col gap-4 items-center justify-center"
  [class.opacity-50]="day()?.kind === 'REST'"
  [class.grayscale-50]="day()?.kind === 'REST'"
  role="listitem"
>
  <div class="flex flex-col w-full px-4 gap-4 items-center mb-8 spin-slow">
    <div class="font-bold text-[0.95rem]">Día {{ dayNumber() }}</div>
    <div class="w-full">
      <app-select
        [text]="'Tipo de día:'"
        [options]="options"
        [control]="selectControl"
        [color]="'secondary'"
        (clearValue)="onClear()"
      ></app-select>
    </div>
    @if (day()?.kind === 'WORKOUT') {
      <div class="w-full">
        <app-routine-list-box></app-routine-list-box>
      </div>
    }
  </div>
</div>
