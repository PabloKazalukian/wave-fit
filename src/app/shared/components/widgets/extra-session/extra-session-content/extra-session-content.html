@if (extraSessions().length > 0) {
  <div class="flex flex-col gap-3 mt-2 p-4 border border-background2 rounded-2xl bg-background3">
    <h4 class="text-xl text-accent font-medium">Sesiones extra registradas</h4>
    @if (loading()) {
      <div class="flex justify-center items-center">
        <div class="h-24 w-24">
          <app-loading></app-loading>
        </div>
      </div>
    } @else {
      @for (session of extraSessions(); track session.id) {
        <app-extra-session-card
          [session]="session"
          [disciplines]="catalog()"
          (onDelete)="deleteExtraSession($event)"
          (onSave)="updateExtraSession($event)"
        ></app-extra-session-card>
      }
    }
  </div>
}
