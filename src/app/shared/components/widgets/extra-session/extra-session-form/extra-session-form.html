@if (catalog().length > 0) {
  <form
    class="p-4 bg-background rounded-2xl shadow-md flex flex-col gap-4"
    [formGroup]="extraSessionForm"
    (ngSubmit)="save()"
  >
    <div class="mb-2">
      <h3 class="text-xl text-accent font-bold">Actividades Extras</h3>
      <p class="text-text2 text-sm">
        Registra entrenamientos adicionales que hiciste hoy (ej: saliste a correr, jugaste al
        fútbol).
      </p>
    </div>

    <div class="flex flex-col gap-4 mt-2 pt-4 border-t-2 border-background2">
      <app-select
        [text]="'Selecciona una categoría'"
        [options]="categories"
        [control]="categoryControl"
        (clearValue)="onCategoryClear()"
      ></app-select>

      @if (categoryControl.value) {
        <app-select
          [text]="'Selecciona la disciplina'"
          [options]="disciplineOptions()"
          [control]="disciplineControl"
          (clearValue)="onDisciplineClear()"
        ></app-select>
      }

      @if (disciplineControl.value) {
        <app-extra-session-create
          [config]="getDisciplineConfig()!"
          (onCancel)="onCategoryClear()"
          (onSave)="save()"
        ></app-extra-session-create>
      }
    </div>
  </form>
} @else {
  <app-loading></app-loading>
}
