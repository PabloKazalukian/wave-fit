<div class="mt-4 p-4 bg-background2 rounded-2xl shadow-md border-t border-border mt-8">
  <div class="mb-6">
    <h3 class="text-xl text-primary font-bold">Actividades Extras</h3>
    <p class="text-text2 text-sm">Registra entrenamientos adicionales que hiciste hoy (ej: saliste a correr, jugaste al fútbol).</p>
  </div>
  
  <div class="flex flex-col gap-4">
    <app-select
      [text]="'Selecciona una categoría'"
      [options]="categories"
      [control]="categoryControl"
    ></app-select>

    @if (categoryControl.value) {
      <app-select
        [text]="'Selecciona la disciplina'"
        [options]="disciplineOptions()"
        [control]="disciplineControl"
      ></app-select>
    }

    @if (selectedDisciplineConfig()) {
      <app-extra-session-card 
          [config]="selectedDisciplineConfig()!"
          (onCancel)="resetForm()"
      ></app-extra-session-card>
    }
  </div>
</div>
