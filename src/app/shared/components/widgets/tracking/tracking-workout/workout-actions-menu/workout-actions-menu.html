<!-- Kebab Menu con dropdown -->
<div class="relative bg-background rounded-full">
  <button
    (click)="toggleActions()"
    class="p-2 rounded-full hover:bg-white/10 transition-colors text-text2"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      fill="none"
      viewBox="0 0 24 24"
      stroke-width="1.5"
      stroke="currentColor"
      class="w-6 h-6"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M12 6.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5ZM12 12.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5ZM12 18.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5Z"
      />
    </svg>
  </button>

  @if (isActionsOpen()) {
    <div
      class="absolute top-full right-0 mt-2 w-56 bg-background3 border border-white/10 rounded-xl shadow-xl overflow-hidden py-2 z-50"
      [@dropdownAnimation]
    >
      <button
        (click)="openRoutineDialog()"
        class="w-full text-left px-4 py-2.5 text-text2 hover:bg-white/5 transition-colors flex items-center gap-3"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="w-5 h-5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M9 4.5v15m6-15v15m-10.875 0h15.75c.621 0 1.125-.504 1.125-1.125V5.25c0-.621-.504-1.125-1.125-1.125H4.125C3.504 4.5 3 5.004 3 5.625v12.75c0 .621.504 1.125 1.125 1.125Z"
          />
        </svg>
        Crear a partir de una rutina ya existente
      </button>

      <button
        (click)="this.facade.setRemoveAllExercises(); isActionsOpen.set(false)"
        class="w-full text-left px-4 py-2.5 text-text2 hover:bg-white/5 transition-colors flex items-center gap-3"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="w-5 h-5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"
          />
        </svg>
        Quitar todo
      </button>

      <button
        (click)="this.facade.setRestDay(); isActionsOpen.set(false)"
        class="w-full text-left px-4 py-2.5 text-text2 hover:bg-white/5 transition-colors flex items-center gap-3"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="w-5 h-5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
          />
        </svg>
        Asignar descanso
      </button>
      <button
        (click)="openCreateRoutineDialog()"
        class="w-full text-left px-4 py-2.5 text-text2 hover:bg-white/5 transition-colors flex items-center gap-3"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="w-5 h-5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 4.5v15m7.5-7.5h-15"
          />
        </svg>
        Guardar una nueva routine
      </button>
    </div>
  }
</div>

<app-dialog
  [isOpen]="isRoutineDialogOpen()"
  (closed)="closeRoutineDialog()"
  [title]="'Selector de rutinas'"
  [closeOnBackdrop]="true"
>
  @if (isLoading()) {
    <div class="flex items-center justify-center p-8">
      <app-loading></app-loading>
    </div>
  } @else {
    <app-workout-routine-selector
      (routineSelected)="onRoutineSelected($event)"
    ></app-workout-routine-selector>
  }
</app-dialog>

<app-dialog
  [isOpen]="isCreateRoutineDialogOpen()"
  (closed)="closeCreateRoutineDialog()"
  [title]="'Crear una nueva routine'"
  [closeOnBackdrop]="true"
>
  <div class="flex flex-col gap-6 p-4">
    <!-- Input for name -->
    <div class="flex flex-col gap-2">
      <label for="routineName" class="text-sm font-medium text-text2 ml-1">
        Nombre de la rutina
      </label>
      <input
        id="routineName"
        type="text"
        [value]="routineName()"
        (input)="onNameChange($event)"
        placeholder="Ej: Empuje A, Mi rutina explosiva..."
        class="w-full bg-background2 border border-white/10 rounded-xl px-4 py-3 text-white placeholder:text-text2/50 focus:outline-none focus:border-accent/50 transition-colors"
      />
    </div>

    <!-- Exercise list -->
    <div class="flex flex-col gap-3">
      <span class="text-sm font-medium text-text2 ml-1">Ejercicios a incluir</span>
      <div class="max-h-60 overflow-y-auto pr-2 flex flex-col gap-2 custom-scrollbar">
        @for (exercise of facade.workoutVM()?.exercises; track exercise.exerciseId) {
          <div class="bg-background2/50 border border-white/5 rounded-xl p-3 flex flex-col gap-0.5">
            <span class="text-white font-medium">{{ exercise.name }}</span>
            <span class="text-xs text-text2/70 uppercase tracking-wider">{{ exercise.category }}</span>
          </div>
        } @empty {
          <div class="text-center py-4 text-text2/50 italic">
            No hay ejercicios cargados
          </div>
        }
      </div>
    </div>

    <!-- Actions -->
    <div class="flex gap-3 mt-2">
      <app-btn
        [text]="'Cancelar'"
        [variant]="'ghost'"
        (click)="closeCreateRoutineDialog()"
      ></app-btn>
      <app-btn
        [text]="'Confirmar'"
        [color]="'accent'"
        [variant]="'raised'"
        [isDisabled]="!routineName() || (facade.workoutVM()?.exercises?.length === 0)"
        (click)="confirmCreateRoutine()"
      ></app-btn>
    </div>
  </div>
</app-dialog>
